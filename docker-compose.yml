services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000"
      HISTORY_LIMIT: "25"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
